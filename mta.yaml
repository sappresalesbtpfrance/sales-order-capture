_schema-version: "3.1"
ID: sales-order-capture
version: 1.0.33
description: Automatic extraction of Sales Orders from documents via SAP Document AI

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci --production --ignore-scripts --legacy-peer-deps
        - npx cds build --production

modules:

  # ── CAP Backend ───────────────────────────────────────────────────────────────
  - name: sales-order-capture-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 512M
      disk-quota: 1024M
      routes:
        - route: "${default-url}"
        - route: "${default-host}.cert.${default-domain}"
    properties:
      CDS_ENV: production
      NODE_ENV: production
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
    requires:
      - name: sales-order-capture-db
      - name: sales-order-capture-xsuaa
      - name: sales-order-capture-destination
      - name: sales-order-capture-connectivity
      - name: sales-order-capture-docai
      - name: sales-order-capture-ias
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ── HDI DB Deployer ───────────────────────────────────────────────────────────
  - name: sales-order-capture-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
    requires:
      - name: sales-order-capture-db

  # ── Fiori Elements App ────────────────────────────────────────────────────────
  - name: sales-order-capture-app
    type: html5
    path: app/sales-orders
    build-parameters:
      builder: custom
      commands:
        - npm ci
        - npm run build
      build-result: dist
      supported-platforms: []

  # ── HTML5 Content Deployer ────────────────────────────────────────────────────
  - name: sales-order-capture-app-content
    type: com.sap.application.content
    path: app
    requires:
      - name: sales-order-capture-html5-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: sales-order-capture-app
          artifacts:
            - salesorders.zip
          target-path: resources/

  # ── Destination Content (registers xsuaa for managed approuter) ─────────────
  - name: sales-order-capture-destination-content
    type: com.sap.application.content
    requires:
      - name: sales-order-capture-destination
        parameters:
          content-target: true
      - name: sales-order-capture-xsuaa
        parameters:
          service-key:
            name: sales-order-capture-xsuaa-key
      - name: sales-order-capture-html5-host
        parameters:
          service-key:
            name: sales-order-capture-html5-host-key
      - name: srv-api
    parameters:
      content:
        instance:
          destinations:
            - Authentication: OAuth2UserTokenExchange
              Name: sales-order-capture-xsuaa
              ServiceInstanceName: sales-order-capture-xsuaa
              ServiceKeyName: sales-order-capture-xsuaa-key
            - Name: sales-order-capture-html5-host
              ServiceInstanceName: sales-order-capture-html5-host
              ServiceKeyName: sales-order-capture-html5-host-key
              sap.cloud.service: salesordercapture
            - Name: srv-api
              Authentication: OAuth2UserTokenExchange
              URL: ~{srv-api/srv-url}
              TokenServiceInstanceName: sales-order-capture-xsuaa
              TokenServiceKeyName: sales-order-capture-xsuaa-key
              HTML5.DynamicDestination: true
              sap.cloud.service: salesordercapture
          existing_destinations_policy: update
    build-parameters:
      no-source: true

resources:

  # ── HANA HDI ──────────────────────────────────────────────────────────────────
  - name: sales-order-capture-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
      service-name: sales-order-capture-hdi

  # ── XSUAA ─────────────────────────────────────────────────────────────────────
  - name: sales-order-capture-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      service-name: sales-order-capture-xsuaa
      path: ./xs-security.json
      config:
        xsappname: sales-order-capture
        tenant-mode: dedicated
        oauth2-configuration:
          redirect-uris:
            - "https://*.${default-domain}/**"

  # ── Destination ───────────────────────────────────────────────────────────────
  - name: sales-order-capture-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      service-name: sales-order-capture-destination
      config:
        HTML5Runtime_enabled: true

  # ── Connectivity ──────────────────────────────────────────────────────────────
  - name: sales-order-capture-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
      service-name: sales-order-capture-connectivity

  # ── HTML5 App Host ─────────────────────────────────────────────────────────────
  - name: sales-order-capture-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
      service-name: sales-order-capture-html5-host

  # ── HTML5 App Runtime ──────────────────────────────────────────────────────────
  - name: sales-order-capture-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
      service-name: sales-order-capture-html5-runtime

  # ── Document AI (existing service in the space) ────────────────────────────────
  - name: sales-order-capture-docai
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: cf-documentai

  # ── IAS ───────────────────────────────────────────────────────────────────────
  - name: sales-order-capture-ias
    type: org.cloudfoundry.managed-service
    parameters:
      service: identity
      service-plan: application
      service-name: sales-order-capture-ias
      config:
        display-name: Sales Order Capture

parameters:
  enable-parallel-deployments: true
